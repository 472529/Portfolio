<div class="container">
  <div class="row">
    <div class="col-sm-4">
      <h3>Circle</h3>
      <svg viewBox="0 -15 200 100">
  <circle r="10" fill="red">
    <animateMotion dur="10s" repeatCount="indefinite"
      path="M20,50 C20,-50 180,15 180,50 C180-50 20,150 20,50 z" />
  </circle>
</svg> 
    </div>
    <div class="col-sm-4">
      <h3>Rounded Square</h3>
        <svg width="400" height="400">
          <polygon points="100,10 40,198 190,78 10,78 160,198"
          style="fill:blue;stroke:purple;stroke-width:9;fill-rule:evenodd;" />
        </svg>
    </div>
    <div class="col-sm-4">
      <h3>Logo</h3>  
        <svg height="2000" width="999">
          <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="10%" style="stop-color:rgb(0,100,255);stop-opacity:1" />
              <stop offset="100%" style="stop-color:rgb(255,0,255);stop-opacity:1" />
            </linearGradient>
          </defs>
          <ellipse cx="100" cy="90" rx="85" ry="55" fill="url(#grad1)" />
          <text fill="#2A3439" font-size="45" font-family="Sans  " x="50" y="86">Bootstrap</text>
          <text fill="#2A3439" font-size="45" font-family="Sans  " x="30" y="86">Bootstrap</text>
